name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/api-rs/target
            services/agent-worker/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/api-rs/Cargo.lock', 'services/agent-worker/Cargo.lock') }}
      - name: Run api-rs tests
        working-directory: services/api-rs
        run: cargo test
      - name: Run agent-worker tests
        working-directory: services/agent-worker
        run: cargo test

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Validate agent extension
        run: |
          node -e "
          const fs = require('fs');
          const src = fs.readFileSync('packages/agent/extension/corp.ts', 'utf8');
          const agent = fs.readFileSync('packages/agent/extension/AGENT.md', 'utf8');
          let pass = 0, fail = 0;

          function check(label, ok) {
            if (ok) { console.log('  ✓ ' + label); pass++; }
            else    { console.log('  ✗ ' + label); fail++; }
          }

          // Tool definitions
          const tools = new Set([...src.matchAll(/name: \"([^\"]+)\"/g)].map(m => m[1]));
          check('Has 30+ tool definitions (found ' + tools.size + ')', tools.size >= 30);

          // Key tools present
          for (const t of [
            'get_workspace_status', 'list_entities', 'get_cap_table',
            'form_entity', 'issue_equity', 'issue_safe',
            'create_invoice', 'generate_contract', 'convene_meeting',
            'create_agent', 'list_obligations', 'get_billing_status',
          ]) { check('Has tool: ' + t, tools.has(t)); }

          // Extension structure
          check('Exports default function', src.includes('export default function'));
          check('Receives ExtensionAPI parameter', src.includes('ExtensionAPI'));
          check('Has session_start handler', src.includes('session_start'));
          check('Has tool_call handler', src.includes('pi.on(\"tool_call\"'));
          check('Has confirmation gating', src.includes('ctx.ui.confirm'));

          // AGENT.md
          check('AGENT.md mentions cents', agent.includes('cents'));
          check('AGENT.md mentions Read tools', agent.includes('Read tools'));

          // bin entry point
          check('bin/corp.mjs exists', fs.existsSync('packages/agent/bin/corp.mjs'));

          console.log('\n' + pass + ' passed, ' + fail + ' failed');
          if (fail > 0) process.exit(1);
          "

  test-ts-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: packages/corp-tools
        run: npm ci
      - name: Run unit tests
        working-directory: packages/corp-tools
        run: npx vitest run

  test-corp-store-integration:
    runs-on: ubuntu-latest
    services:
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      minio:
        image: quay.io/minio/minio:latest
        ports:
          - 19000:9000
          - 19001:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "mc ready local"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/corp-store/target
          key: ${{ runner.os }}-cargo-corp-store-${{ hashFiles('crates/corp-store/Cargo.lock') }}
      - name: Create MinIO bucket
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:19000 minioadmin minioadmin
          mc mb --ignore-existing local/corp-store-test
      - name: Run corp-store S3 integration tests
        working-directory: crates/corp-store
        run: cargo test --test integration_s3 --features s3 -- --include-ignored

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -t thecorporation-backend:ci -f services/api-rs/Dockerfile .

  test-integration:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build api-rs Docker image
        run: docker build -t api-rs:ci -f services/api-rs/Dockerfile .
      - name: Start api-rs container
        run: |
          docker run -d --name api-rs-integration \
            -e JWT_SECRET=integration-test-secret \
            -e SECRETS_MASTER_KEY=YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE= \
            -e INTERNAL_WORKER_TOKEN=integration-test-worker-token \
            -e RUST_LOG=api_rs=info \
            -p 8000:8000 \
            api-rs:ci
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start"
          docker logs api-rs-integration
          exit 1
      - name: Install corp-tools dependencies
        working-directory: packages/corp-tools
        run: npm ci
      - name: Run integration tests
        working-directory: packages/corp-tools
        env:
          CORP_API_URL: http://localhost:8000
        run: npx vitest run --config vitest.integration.config.ts
      - name: Cleanup
        if: always()
        run: |
          docker stop api-rs-integration || true
          docker rm api-rs-integration || true
