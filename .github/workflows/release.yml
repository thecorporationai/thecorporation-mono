name: Release

on:
  push:
    tags:
      # CalVer tags: YY.M.MICRO (no v prefix)
      - "[0-9][0-9].[0-9]*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (excluding CLI binary tests)
        run: cargo test --workspace --exclude corp-server && cargo test -p corp-server --lib --test api_lifecycle --test dual_backend --test scenario_carta_scale
      - name: Run CLI integration tests
        run: cargo build -p corp-cli -p corp-server && cargo test -p corp-server --test cli_formation_workflow

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: corp-linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: corp-linux-arm64-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: corp-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: corp-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: corp-win32-x64-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p corp-server -p corp-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p staging/bin
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/corp-server.exe" staging/bin/
            cp "target/${TARGET}/release/corp.exe" staging/bin/
          else
            cp "target/${TARGET}/release/corp-server" staging/bin/
            cp "target/${TARGET}/release/corp" staging/bin/
          fi
      - name: Create npm platform package
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          NPM_PKG: ${{ matrix.npm_pkg }}
        run: |
          mkdir -p npm-pkg/bin
          cp staging/bin/* npm-pkg/bin/
          node -e "
            const fs = require('fs');
            const pkg = process.env.NPM_PKG;
            const ver = process.env.TAG_NAME;
            const parts = pkg.replace('corp-','').split('-');
            const json = {
              name: '@thecorporation/' + pkg,
              version: ver,
              description: 'Platform binaries for @thecorporation/corp',
              os: [parts[0]],
              cpu: [parts[1]],
              files: ['bin/'],
              license: 'Apache-2.0'
            };
            fs.writeFileSync('npm-pkg/package.json', JSON.stringify(json, null, 2));
          "
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm-pkg/
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: staging/bin/

  publish-npm:
    name: Publish npm
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          for pkg in corp-linux-x64-gnu corp-linux-arm64-gnu corp-darwin-x64 corp-darwin-arm64 corp-win32-x64-msvc; do
            if [ -d "artifacts/${pkg}" ]; then
              echo "Publishing @thecorporation/${pkg}@${TAG_NAME}"
              cd "artifacts/${pkg}"
              npm publish --provenance --access public || true
              cd ../..
            fi
          done
      - name: Build and publish @thecorporation/corp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd packages/corp-ts
          npm install
          npx tsup
          npm version "${TAG_NAME}" --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const ver = process.env.TAG_NAME;
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = ver;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm publish --provenance --access public

  github-release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Package release archives
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release
          for dir in artifacts/binaries-*; do
            target=$(basename "$dir" | sed 's/binaries-//')
            tar -czf "release/corp-${TAG_NAME}-${target}.tar.gz" -C "$dir" .
          done
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "Release ${TAG_NAME}" \
            --generate-notes \
            release/*.tar.gz
