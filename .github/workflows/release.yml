name: Release

on:
  push:
    tags: ["[0-9][0-9].[0-9]*"]

permissions:
  contents: write
  id-token: write

env:
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "22"
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/api-rs/target
            services/agent-worker/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/api-rs/Cargo.lock', 'services/agent-worker/Cargo.lock') }}
      - name: Run api-rs tests
        working-directory: services/api-rs
        run: cargo test
      - name: Run agent-worker tests
        working-directory: services/agent-worker
        run: cargo test

  build-binaries:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            cargo-flags: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            cargo-flags: ""
          - runner: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            cargo-flags: "--features vendored-openssl"
          - runner: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            cargo-flags: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/api-rs/target
            services/agent-worker/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('services/api-rs/Cargo.lock', 'services/agent-worker/Cargo.lock') }}
      - name: Build api-rs binary
        working-directory: services/api-rs
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo-flags }}
      - name: Build agent-worker binary
        working-directory: services/agent-worker
        run: cargo build --release --target ${{ matrix.target }}
      - name: Copy binaries to npm package
        run: |
          mkdir -p packages/server/npm/${{ matrix.platform }}/bin
          cp services/api-rs/target/${{ matrix.target }}/release/api-rs packages/server/npm/${{ matrix.platform }}/bin/api-rs
          cp services/agent-worker/target/${{ matrix.target }}/release/agent-worker packages/server/npm/${{ matrix.platform }}/bin/agent-worker
          chmod +x packages/server/npm/${{ matrix.platform }}/bin/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: packages/server/npm/${{ matrix.platform }}

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts

      - name: Place binaries into npm package dirs
        run: |
          for platform in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64; do
            cp -r artifacts/binary-${platform}/* packages/server/npm/${platform}/
          done

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Ensure npm supports trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@^11.5.1
          npm --version

      - name: Clear npm auth config
        run: rm -f "$HOME/.npmrc"

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail

          # CalVer tags (YY.M.MICRO) are already valid npm semver (e.g. 26.3.1).
          VERSION="${GITHUB_REF_NAME}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not valid CalVer semver. Use tags like 26.3.1 or 26.3.1-rc.1."
            exit 1
          fi

          # Detect prerelease and set NPM_TAG accordingly.
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            PRE="${VERSION#*-}"
            NPM_TAG="${PRE%%[.0-9]*}"
            NPM_TAG="${NPM_TAG:-next}"
          else
            NPM_TAG="latest"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Using release version: $VERSION (from tag: $GITHUB_REF_NAME, npm dist-tag: $NPM_TAG)"

      - name: Rewrite versions for publishing
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail

          mapfile -t PACKAGES < <(find packages -not -path '*/node_modules/*' -type f -name package.json | sort)

          for pkg in "${PACKAGES[@]}"; do
            jq --arg v "$VERSION" '
              .version = $v |
              def bump_section($section):
                if has($section) then
                  .[$section] |= with_entries(
                    if ((.key | startswith("@thecorporation/")) and ((.value | type) == "string"))
                    then .value = $v
                    else .
                    end
                  )
                else
                  .
                end;
              bump_section("dependencies")
              | bump_section("optionalDependencies")
              | bump_section("peerDependencies")
              | bump_section("devDependencies")
            ' "$pkg" > "${pkg}.tmp" && mv "${pkg}.tmp" "$pkg"
          done

      - name: Install dependencies and build TS packages
        run: |
          set -euo pipefail

          # Build corp-tools first (dependency for others)
          cd packages/corp-tools
          npm install
          npm run build
          cd ../..

          # Build server
          cd packages/server
          npm install
          npm run build
          cd ../..

          # Build mcp-server
          cd packages/mcp-server
          npm install
          npm run build
          cd ../..

          # Build cli-ts
          cd packages/cli-ts
          npm install
          npm run build
          cd ../..

      - name: Publish to npm
        env:
          NPM_TAG: ${{ steps.version.outputs.NPM_TAG }}
        run: |
          set -euo pipefail

          # 1. corp-tools (no deps on other @thecorporation packages)
          npm publish ./packages/corp-tools --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org

          # 2. Platform binary packages
          for platform in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64; do
            npm publish ./packages/server/npm/${platform} --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org
          done

          # 3. server (depends on platform binary packages)
          npm publish ./packages/server --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org

          # 4. mcp-server (depends on corp-tools)
          npm publish ./packages/mcp-server --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org

          # 5. cli (depends on corp-tools, server)
          npm publish ./packages/cli-ts --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org

          # 6. agent (no @thecorporation deps — only peer dep on @mariozechner/pi-coding-agent)
          npm publish ./packages/agent --provenance --access public --tag "$NPM_TAG" --registry=https://registry.npmjs.org

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
