[project]
name = "thecorporation"
version = "0.1.0"
description = "MCP server for agent-native corporate operations — form LLCs, manage equity, run payroll, file taxes"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.2.0",
    "corp-tools",
]

[tool.uv.sources]
corp-tools = { path = "../../shared", editable = true }

[project.scripts]
thecorporation = "thecorporation.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
