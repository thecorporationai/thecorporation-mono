services:
  valkey:
    image: valkey/valkey:8
    command: valkey-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 192M

  api:
    build:
      context: ../..
      dockerfile: services/api-rs/Dockerfile
    environment:
      - REDIS_URL=redis://valkey:6379
      - INTERNAL_WORKER_TOKEN=dev-internal-worker-token
      - JWT_SECRET=dev-secret-do-not-use-in-production
      - DATA_DIR=/data/repos
    ports:
      - "8000:8000"
    volumes:
      - api-data:/data/repos
    depends_on:
      - valkey

  worker:
    build:
      context: ../..
      dockerfile: services/agent-worker/Dockerfile
    environment:
      - REDIS_URL=redis://valkey:6379
      - API_BASE_URL=http://api:8000
      - API_BEARER_TOKEN=dev-internal-worker-token
      - DOCKER_HOST=unix:///var/run/docker.sock
      - WORKSPACE_ROOT=/var/lib/agents/workspaces
      - RUNTIME_IMAGE=agents-runtime:pi
      - MAX_CONCURRENCY=4
      - RUST_LOG=agent_worker=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/var/lib/agents/workspaces
    depends_on:
      - valkey
      - api
    deploy:
      replicas: 2

  agent-runtime:
    image: agents-runtime:pi
    build:
      context: ../..
      dockerfile: services/agent-worker/Dockerfile.runtime
      target: pi
    profiles:
      - build-only

volumes:
  api-data:
  workspaces:
